"unique-id-on-edited-item": true

# This config value has two effects:
#- It differentiates between effects that are amplified by increasing the strength and effects that actually only have one strength.
#- It allows/prevents the item editor from increasing an effects applied to an item beyond strength level 1.
# The list of the effects that only have one strength level:
  # BLINDNESS,
  # DARKNESS,
  # FIRE_RESISTANCE,
  # GLOWING,
  # INVISIBILITY,
  # NAUSEA,
  # NIGHT_VISION,
  # TRIAL_OMEN,
  # SLOW_FALLING,
  # WATER_BREATHING,
  # INFESTED,
  # OOZING,
  # WEAVING,
  # WIND_CHARGED
"differ-capped-effects": true
"armor-effects":
  # If true, potion particles will be visible around the player.
  # Set this to false if you want the effect to be completely invisible
  # (no swirling particles).
  showParticles: false

  # If true, the effect will be marked as "ambient".
  # Ambient effects have a more subtle visual style and are typically used
  # for effects coming from beacons
  showAmbient: false

  # If true, the potion effect icon will be shown in the player's HUD
  # (top-right corner of the screen).
  # Set this to false to hide the icon while still applying the effect.
  showIcon: true
"show-flags-by-default-in-item-lore":
  "minecraft-item-flags": true
  "custom-armor-effects": true
  "custom-prevention-flags": true
# Controls whether attribute modifiers can be created for equipment slots that the item (which is currently edited) cannot be equipped in
#  true -> deactivates slots the item is not equippable on
#  false -> activates slots that an item cannot normally be equipped on
"attribute-modifier":
  "validate-attribute-slotgroups": true